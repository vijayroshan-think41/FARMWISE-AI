services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: farmwise
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file:
      - ./server/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@db:5432/farmwise
    ports:
      - "8010:8010"
    depends_on:
      - db

  client:
    build: ./client
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
